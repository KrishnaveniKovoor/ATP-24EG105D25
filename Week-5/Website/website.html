<!DOCTYPE html>
<html lang="en">
<head>

  <title>Cards Layout</title>
  <link rel="stylesheet" href="website.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <ul>
    <li>Home</li>

    <div class="card">
      <img src="https://www.architectureideas.info/wp-content/uploads/2008/08/Architecture-Creativity-Zaha-Hadid.jpg">

      <h4>This Week’s Accessories</h4>

    <div class="card">
      <img src="https://www.architectureideas.info/wp-content/uploads/2008/08/Architecture-Creativity-Zaha-Hadid.jpg">
